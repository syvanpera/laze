---
- name: Load common packages
  include_vars:
    file: packages_common.yml

- name: Load distribution-specific packages
  include_vars:
    file: "{{ item }}"
  with_first_found:
    - "packages_{{ ansible_facts['os_family'] }}.yml"
    - "packages_default.yml"
  ignore_errors: yes

- name: Install common packages
  package:
    name: "{{ (package_map | default({}))[item] | default(item) }}"
    state: present
  with_items: "{{ common_packages }}"

- name: Install distribution-specific packages
  package:
    name: "{{ (package_map | default({}))[item] | default(item) }}"
    state: present
  with_items: "{{ distro_packages }}"
  when: distro_packages is defined

- name: AUR Support (Arch Linux)
  when: ansible_os_family == "Archlinux"
  block:
    - name: Allow user to run pacman without password (for AUR)
      copy:
        content: "{{ ansible_user_id }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        dest: "/etc/sudoers.d/10-{{ ansible_user_id }}-pacman"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'
      become: yes

    - name: Check if paru is installed
      command: which paru
      register: paru_check
      ignore_errors: yes
      changed_when: false
      become: no

    - name: Install paru if not present
      when: paru_check.rc != 0
      block:
        - name: Clone paru
          git:
            repo: https://aur.archlinux.org/paru-bin.git
            dest: /tmp/paru-bin
            update: yes

        - name: Build and install paru
          command: makepkg -si --noconfirm
          args:
            chdir: /tmp/paru-bin
      become: no

    - name: Install AUR packages
      command: "paru -S --noconfirm {{ item }}"
      with_items: "{{ aur_packages }}"
      when: aur_packages is defined and aur_packages | length > 0
      become: no

---
- name: Update package cache (Debian family)
  apt:
    update_cache: yes
    upgrade: yes
  when: ansible_facts['os_family'] == "Debian"

- name: Update package cache (RedHat family)
  dnf:
    name: "*"
    state: latest
  when: ansible_facts['os_family'] == "RedHat"

- name: Update package cache (Archlinux family)
  pacman:
    update_cache: yes
    upgrade: yes
  when: ansible_facts['os_family'] == "Archlinux"

- name: Configure interception-tools caps2esc (Arch Linux)
  block:
    - name: Ensure interception directory exists
      file:
        path: /etc/interception
        state: directory
        mode: '0755'

    - name: Create udevmon configuration
      copy:
        content: |
          - JOB: "intercept -g $DEVNODE | caps2esc -m 1 | uinput -d $DEVNODE"
            DEVICE:
              EVENTS:
                EV_KEY: [KEY_CAPSLOCK, KEY_ESC]
        dest: /etc/interception/udevmon.yaml
        mode: '0644'
  when: ansible_facts['os_family'] == "Archlinux"


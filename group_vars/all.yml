---
# URL to your separate dotfiles repository
dotfiles_repo_url: "https://github.com/syvanpera/dotfiles.git"
# Branch, tag, or commit hash to check out (default is main)
dotfiles_repo_version: "main"
# Local path where dotfiles should be cloned
dotfiles_dest: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
# Command to run for dotfiles installation (if applicable)
dotfiles_install_command: "./install.sh"

# Email used for SSH key comment
ssh_key_email: "tuomo.syvanpera@gmail.com"

# Directory for global npm packages
npm_config_prefix: "{{ ansible_facts['user_dir'] }}/.npm-global"
